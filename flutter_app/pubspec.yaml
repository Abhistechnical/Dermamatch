name: dermamatch_ai
description: DermaMatch AI - Skin Tone Analysis & Foundation Matching
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Auth & Database
  supabase_flutter: ^2.5.0

  # Navigation
  go_router: ^13.2.0

  # State Management
  provider: ^6.1.2

  # Image
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1

  # HTTP
  http: ^1.2.1
  dio: ^5.4.3+1

  # Payment
  razorpay_flutter: ^1.3.6

  # UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  lottie: ^3.1.0
  percent_indicator: ^4.2.3
  fl_chart: ^0.67.0
  shimmer: ^3.0.0

  # Utils
  shared_preferences: ^2.2.3
  image: ^4.2.0
  path_provider: ^2.1.3
  url_launcher: ^6.3.0
  flutter_dotenv: ^5.1.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - .env
