services:
  - type: web
    name: dermamatch-ai-backend
    env: python
    buildCommand: |
      cd color_engine
      pip install -r requirements.txt
    startCommand: |
      cd color_engine
      uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: API_KEY
        value: YOUR_SECRET_API_KEY
